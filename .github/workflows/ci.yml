name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Secret scan
        run: npm run scan:secrets
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      # Boots the built server and asserts every key route renders without a
      # 5xx — the failure class `next build` can't catch (a bad data call or
      # server-only crash on a force-dynamic page surfaces only on request).
      - name: Smoke (every route renders)
        run: npm run smoke

  # The Python half of the gate (CLAUDE.md). The call-gateway/neural-voice
  # services ship in the same repo and deploy as a container, so a Python
  # regression here must fail CI too — not surface only at deploy time. Heavy
  # deps are imported lazily, so these checks are stdlib-only (no pip install).
  python-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python services
        run: python3 -m py_compile services/call-gateway/*.py
      - name: Call-gateway unit tests
        run: cd services/call-gateway && python3 -m unittest discover -s tests
