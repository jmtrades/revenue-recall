name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Secret scan
        run: npm run scan:secrets
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Typecheck (tests)
        run: npm run typecheck:tests
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      # Boots the built server and asserts every key route renders without a
      # 5xx — the failure class `next build` can't catch (a bad data call or
      # server-only crash on a force-dynamic page surfaces only on request).
      - name: Smoke (every route renders)
        run: npm run smoke
