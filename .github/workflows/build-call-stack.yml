# Publishes the combined call-stack image (in-house neural voice + call-gateway)
# to GitHub Container Registry (GHCR). This is what lets the gateway be deployed
# as a single container from an image URL — no Render<->GitHub connection and no
# Blueprint needed. Trigger it manually (Actions tab -> Run workflow) or it runs
# automatically when anything under services/ changes.
name: build-call-stack

on:
  workflow_dispatch:
  push:
    branches: [claude/build-universal-sales-system-RY33X]
    paths:
      - "services/**"
      - ".github/workflows/build-call-stack.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image name must be lowercase for GHCR.
      - name: Compute image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/revenue-recall-call-stack" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services
          file: services/Dockerfile
          push: true
          tags: ${{ steps.img.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Call-stack image published :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Deploy this on Render (New + -> Web Service -> Deploy an existing image):" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.img.outputs.name }}:latest" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
