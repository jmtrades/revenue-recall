# Render Blueprint — deploy the AI call-gateway in a few clicks. This is what
# makes real AI phone calls go live without running FreeSWITCH yourself. Voice is
# ElevenLabs-only, so there's just ONE service to deploy (no separate voice host).
#
# HOW: Render dashboard → New + → Blueprint → connect this repo → Apply. Render
# reads this file, builds the service, and prompts you for the secret values
# (the ones marked sync:false). After the FIRST deploy, copy the call-gateway's
# public URL and set PUBLIC_WSS_BASE = wss://<that-host> (see GO-LIVE-CALLS.md).
services:
  - type: web                         # public — Twilio reaches this over wss://
    name: rr-call-gateway
    runtime: docker
    rootDir: services/call-gateway
    dockerfilePath: ./Dockerfile
    plan: standard
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: CALL_STATUS_WEBHOOK_URL
        value: https://recall-touch.com/api/calls/log
      - key: WHISPER_MODEL
        value: base.en
      - key: ELEVENLABS_MODEL
        value: eleven_turbo_v2_5
      - key: ELEVENLABS_API_KEY
        sync: false                              # paste: your ElevenLabs key (voice)
      - key: ELEVENLABS_VOICE_ID
        sync: false                              # optional: default ElevenLabs voice id
      - key: ANTHROPIC_API_KEY
        sync: false                              # paste: your Anthropic key
      - key: TWILIO_ACCOUNT_SID
        sync: false                              # paste: from Twilio console
      - key: TWILIO_AUTH_TOKEN
        sync: false                              # paste: from Twilio console
      - key: TWILIO_FROM_NUMBER
        sync: false                              # paste: your Twilio number, e.g. +14155551234
      - key: COMMS_WEBHOOK_TOKEN
        sync: false                              # paste: same secret as in Vercel
      - key: PUBLIC_WSS_BASE
        sync: false                              # set AFTER first deploy: wss://<gateway host>
